name: Spring Boot CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: setup java 17
        uses: actions/checkout@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Give execute permission to Maven Wrapper
        run: chmod +x mvnw


      - name: Build Project
        run: ./mvnw clean install

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: springboot-jar
          path: target/*.jar

